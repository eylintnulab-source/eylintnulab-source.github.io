<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的 GitHub Pages</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --accent: #0969da;
      --bg: #f8fafc;
      --panel: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    main {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(28px, 6vw, 56px);
      box-shadow: 0 18px 50px rgba(60, 64, 67, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.25rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }

    a {
      color: var(--accent);
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 650;
    }

    .button.secondary {
      background: transparent;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>你好，我是你的名字</h1>
    <p>這是我的第一個 GitHub Pages 網頁。你可以把這裡改成自我介紹、作品集、課堂作業、履歷，或任何想公開分享的內容。</p>
    <div class="actions">
      <a class="button" href="https://github.com/" target="_blank" rel="noreferrer">前往 GitHub</a>
      <a class="button secondary" href="mailto:you@example.com">聯絡我</a>
    </div>
  </main>
</body>
</html>
